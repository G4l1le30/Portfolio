name: Scheduled Medium Sync

on:
  schedule:
    # Berjalan setiap 12 jam (pukul 00:00 dan 12:00 UTC)
    - cron: '0 */12 * * *'
  workflow_dispatch:
    # Memungkinkan kamu menjalankan manual dari tab Actions di GitHub

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        run: |
          curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
